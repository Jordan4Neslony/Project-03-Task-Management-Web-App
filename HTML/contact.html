<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Task-Management-Web-App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!--Navigation Bar-->
    <nav class="navigational-bar" id="headerNavigation">
        <h1 class="nav-title">To-Do-App</h1>
        <ul class="nav-list links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="./todos.html">Todos</a></li>
            <li><a href="./contact.html" aria-disabled="true">Contact</a></li>
        </ul>
    </nav>
    <!--Vertical Style Bars-->
    <div class="left-vertical-bar"></div>
    <div class="right-vertical-bar"></div>
    <!--Content Spacer-->
    <div style="margin-bottom: 10%;"></div>
    <!--Heading Text-->
    <h1 class="text-center description-white">
        Contact Me?
    </h1>

    <!--Survey-->
    <div class="contact-me-form">
        <form action="" method="post" class="m-4 ">
            <table class="table table-bordered mx-auto ">
                <tbody>
                    <tr>
                        <td><label for="firstName" class="form-label">First Name</label></td>
                        <td><input type="text" class="form-control" id="firstName" name="firstName"
                                placeholder="Enter first name" required></td>
                    </tr>
                    <tr>
                        <td><label for="lastName" class="form-label">Last Name</label></td>
                        <td><input type="text" class="form-control" id="lastName" name="lastName"
                                placeholder="Enter last name"></td>
                    </tr>
                    <tr>
                        <td><label for="email" class="form-label">Email</label></td>
                        <td><input type="email" class="form-control" id="email" name="email" placeholder="Enter email"
                                required>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="comments" class="form-label">Comments</label></td>
                        <td>
                            <textarea class="form-control" id="comments" name="comments" rows="5"
                                placeholder="Enter your comments here..." required></textarea>
                        </td>

                    </tr>
                    <tr>
                        <td>
                            <label class="form-label">Submit</label>
                        </td>
                        <td>
                            <div class="modal-footer">
                                <input class="btn btn-secondary" type="submit" value="Submit">
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </div>
</body>

</html>
